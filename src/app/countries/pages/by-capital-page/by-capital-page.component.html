<h2>Por capital</h2>
<hr>

<div class="row">
  <div class="col">
    <shared-search-box
    (onValue)="searchByCapital($event)"
    placeholder="Este es un nuevo placeholder"></shared-search-box>
  </div>
</div>

<div class="row">
  <div class="col">
    <hr>
    <ul>
      <li *ngFor="let country of countries">
        {{ country.name }} - {{ country.population }}
      </li>
    </ul>
  </div>
</div>
